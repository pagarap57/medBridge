<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Marcellus+SC&display=swap" rel="stylesheet">
  <title>MedBridge Home</title>
  <style>
    .marcellus-sc-regular {
      font-family: "Marcellus SC", serif;
      font-weight: 400;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      overflow: clip;
      background:
        radial-gradient(circle at 20% 20%, rgba(53, 130, 101, 0.35), transparent 30%),
        radial-gradient(circle at 80% 12%, rgba(32, 100, 80, 0.4), transparent 28%),
        radial-gradient(circle at 92% 20%, rgba(150, 81, 49, 0.22), transparent 22%),
        radial-gradient(circle at 15% 90%, rgba(138, 146, 196, 0.28), transparent 26%),
        linear-gradient(180deg, #23272d 0%, #31445d 55%, #425d8d 100%);
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }

    .screen {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15)),
        linear-gradient(180deg, #26323a 0%, #314661 52%, #46628f 100%);
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 30%, rgba(67, 121, 97, 0.18), transparent 35%),
        radial-gradient(circle at 35% 70%, rgba(83, 91, 173, 0.10), transparent 35%),
        radial-gradient(circle at 88% 50%, rgba(130, 98, 175, 0.08), transparent 24%);
      filter: blur(14px);
      pointer-events: none;
    }

    .blob {
      position: absolute;
      filter: blur(4px);
      opacity: 0.28;
      z-index: 0;
    }

    .blob1 {
      width: 500px;
      height: 380px;
      top: -120px;
      left: 6%;
      background: rgba(190, 218, 255, 0.22);
      border-radius: 56% 44% 38% 62% / 48% 35% 65% 52%;
      transform: rotate(-14deg);
    }

    .blob2 {
      width: 440px;
      height: 500px;
      top: 10%;
      right: -40px;
      background: rgba(11, 87, 65, 0.40);
      border-radius: 44% 56% 62% 38% / 40% 63% 37% 60%;
      transform: rotate(8deg);
    }

    .blob3 {
      width: 700px;
      height: 520px;
      bottom: -240px;
      left: -120px;
      transform: rotate(9deg);
      background: rgba(102, 138, 201, 0.18);
      border-radius: 46% 54% 58% 42% / 50% 42% 58% 50%;
    }

    .blob4 {
      width: 360px;
      height: 300px;
      bottom: -70px;
      right: 8%;
      background: rgba(210, 228, 255, 0.15);
      border-radius: 60% 40% 52% 48% / 45% 57% 43% 55%;
      transform: rotate(-20deg);
    }

    .blob5 {
      width: 290px;
      height: 240px;
      top: 52%;
      left: 18%;
      background: rgba(170, 148, 243, 0.12);
      border-radius: 54% 46% 34% 66% / 58% 30% 70% 42%;
      transform: rotate(22deg);
    }

    .blob6 {
      width: 260px;
      height: 200px;
      top: 62%;
      right: 4%;
      background: rgba(140, 166, 227, 0.14);
      border-radius: 42% 58% 66% 34% / 38% 49% 51% 62%;
      transform: rotate(-26deg);
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 100vh;
      padding: 56px 20px;
    }

    .card {
      width: 100%;
      max-width: 470px;
      text-align: center;
      padding: 30px 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .panel {
      width: 100%;
      max-width: 470px;
      text-align: center;
      padding: 30px 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .brand {
      font-family: "Marcellus SC", serif;
      font-size: 4.3rem;
      letter-spacing: 2px;
      line-height: 0.95;
      margin-bottom: 4px;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.35);
    }

    .subtitle {
      font-size: 1.15rem;
      color: rgba(255, 255, 255, 0.76);
      margin-bottom: 8px;
    }

    .primary-btn,
    .secondary-btn {
      width: 100%;
      border: none;
      cursor: pointer;
      border-radius: 26px;
      padding: 18px 22px;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 1px;
      font-family: Georgia, "Times New Roman", serif;
      color: #0d1d43;
      background: linear-gradient(90deg, rgba(243, 240, 249, 0.96), rgba(239, 237, 225, 0.92));
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
    }

    .primary-btn:hover,
    .secondary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22);
    }

    .small-text {
      margin-top: 10px;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.88);
    }

    .secondary-text {
      margin-top: 10px;
      margin-bottom: 6px;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.88);
    }

    .arrow {
      margin-left: 8px;
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .blob1 {
        width: 480px;
        height: 480px;
        left: 60px;
        top: -80px;
      }

      .blob2 {
        width: 420px;
        height: 420px;
        left: 70px;
        top: 180px;
      }

      .blob3 {
        width: 480px;
        height: 360px;
        right: -120px;
        top: 500px;
      }

      .primary-btn {
        min-height: 90px;
        border-radius: 28px;
        margin-bottom: 60px;
      }

      .secondary-btn {
        min-height: 64px;
      }
    }

    @media (max-width: 600px) {
      .brand {
        font-size: 3.1rem;
      }

      .card {
        padding: 24px 18px;
      }

      .primary-btn,
      .secondary-btn {
        font-size: 1.05rem;
      }

      .content {
        min-height: auto;
        padding: 44px 14px 52px;
      }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="blob blob4"></div>
    <div class="blob blob5"></div>
    <div class="blob blob6"></div>
    <div class="blob blob7"></div>

    <div class="content">
  <div class="panel">
    <h1 class="brand">MedBridge</h1>

    <button class="primary-btn" onclick="window.location.href='/login'">
      LOGIN! <span class="arrow">→</span>
    </button>

    <p class="secondary-text">New to MedBridge?</p>

    <button class="secondary-btn" onclick="window.location.href='/signup'">
      SIGN UP! <span class="arrow">→</span>
    </button>
  </div>
</div>
    </div>
</body>
</html>
