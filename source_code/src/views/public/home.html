<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Marcellus+SC&display=swap" rel="stylesheet">
  <title>MedBridge Home</title>
  <style>
    .marcellus-sc-regular {
      font-family: "Marcellus SC", serif;
      font-weight: 400;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      overflow: clip;
      background:
        radial-gradient(circle at 16% 18%, rgba(118, 233, 197, 0.11), transparent 34%),
        radial-gradient(circle at 86% 20%, rgba(255, 174, 115, 0.10), transparent 29%),
        radial-gradient(circle at 72% 80%, rgba(136, 146, 255, 0.10), transparent 32%),
        linear-gradient(180deg, #0e1b20 0%, #21384f 55%, #2c3960 100%);
      position: relative;
    }

    .blob {
      position: absolute;
      filter: blur(4px);
      opacity: 0.28;
      z-index: 0;
    }

    .blob1 {
      width: 500px;
      height: 380px;
      top: -120px;
      left: 6%;
      background: rgba(190, 218, 255, 0.22);
      border-radius: 56% 44% 38% 62% / 48% 35% 65% 52%;
      transform: rotate(-14deg);
    }

    .blob2 {
      width: 440px;
      height: 500px;
      top: 10%;
      right: -40px;
      background: rgba(11, 87, 65, 0.40);
      border-radius: 44% 56% 62% 38% / 40% 63% 37% 60%;
      transform: rotate(8deg);
    }

    .blob3 {
      width: 700px;
      height: 520px;
      bottom: -240px;
      left: -120px;
      transform: rotate(9deg);
      background: rgba(102, 138, 201, 0.18);
      border-radius: 46% 54% 58% 42% / 50% 42% 58% 50%;
    }

    .blob4 {
      width: 360px;
      height: 300px;
      bottom: -70px;
      right: 8%;
      background: rgba(210, 228, 255, 0.15);
      border-radius: 60% 40% 52% 48% / 45% 57% 43% 55%;
      transform: rotate(-20deg);
    }

    .blob5 {
      width: 290px;
      height: 240px;
      top: 52%;
      left: 18%;
      background: rgba(170, 148, 243, 0.12);
      border-radius: 54% 46% 34% 66% / 58% 30% 70% 42%;
      transform: rotate(22deg);
    }

    .blob6 {
      width: 260px;
      height: 200px;
      top: 62%;
      right: 4%;
      background: rgba(140, 166, 227, 0.14);
      border-radius: 42% 58% 66% 34% / 38% 49% 51% 62%;
      transform: rotate(-26deg);
    }

    .wrapper {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
    }

    .card {
      width: 100%;
      max-width: 470px;
      text-align: center;
      padding: 30px 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .brand {
      font-family: "Marcellus SC", serif;
      font-size: 4.3rem;
      letter-spacing: 2px;
      line-height: 0.95;
      margin-bottom: 4px;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.35);
    }

    .subtitle {
      font-size: 1.15rem;
      color: rgba(255, 255, 255, 0.76);
      margin-bottom: 8px;
    }

    .primary-btn,
    .secondary-btn {
      width: 100%;
      border: none;
      cursor: pointer;
      border-radius: 26px;
      padding: 18px 22px;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 1px;
      font-family: Georgia, "Times New Roman", serif;
      color: #0d1d43;
      background: linear-gradient(90deg, rgba(243, 240, 249, 0.96), rgba(239, 237, 225, 0.92));
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
    }

    .primary-btn:hover,
    .secondary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22);
    }

    .small-text {
      margin-top: 10px;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.88);
    }

    .arrow {
      margin-left: 8px;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .brand {
        font-size: 3.1rem;
      }

      .card {
        padding: 24px 18px;
      }

      .primary-btn,
      .secondary-btn {
        font-size: 1.05rem;
      }
    }
  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>
  <div class="blob blob5"></div>
  <div class="blob blob6"></div>

  <div class="wrapper">
    <div class="card">
      <h1 class="brand">MedBridge</h1>
      <p class="subtitle">Been here before?</p>

      <button class="primary-btn" onclick="window.location.href='/login'">
        LOGIN! <span class="arrow">&rarr;</span>
      </button>

      <p class="small-text">New to MedBridge?</p>

      <button class="secondary-btn" onclick="window.location.href='/signup'">
        SIGN UP! <span class="arrow">&rarr;</span>
      </button>
    </div>
  </div>
</body>
</html>
