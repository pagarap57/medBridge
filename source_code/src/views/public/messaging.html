<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedBridge Messages</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#ebe6e6;
color:#111;
min-height:100vh;
}

.page{
max-width:1300px;
margin:0 auto;
padding:28px 32px 48px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:36px;
}

.logo{
font-family:'Cormorant Garamond',serif;
font-size:3.4rem;
color:#0f4d4f;
text-decoration:none;
}

.logout{
text-decoration:none;
color:#555;
font-weight:500;
}

.messages-container{
display:grid;
grid-template-columns:320px 1fr;
gap:28px;
height:70vh;
}

/* Sidebar */

.sidebar{
background:#dfd8d8;
border-radius:22px;
padding:18px;
overflow-y:auto;
}

.sidebar h3{
margin-bottom:18px;
font-weight:600;
}

.conversation{
padding:14px;
border-radius:14px;
margin-bottom:10px;
cursor:pointer;
transition:.15s;
}

.conversation:hover{
background:#ece7e7;
}

.conversation.active{
background:#ffffff;
}

.conversation-name{
font-weight:600;
font-size:.95rem;
}

.conversation-preview{
font-size:.8rem;
color:#666;
margin-top:3px;
}

/* Chat Window */

.chat-window{
background:#dfd8d8;
border-radius:22px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.chat-header{
padding:18px 22px;
border-bottom:1px solid rgba(0,0,0,0.08);
font-weight:600;
}

.messages{
flex:1;
padding:24px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:14px;
}

.message{
max-width:60%;
padding:12px 16px;
border-radius:16px;
font-size:.9rem;
line-height:1.4;
}

.received{
background:#ffffff;
align-self:flex-start;
}

.sent{
background:#0f4d4f;
color:white;
align-self:flex-end;
}

/* Input */

.message-input{
display:flex;
padding:18px;
border-top:1px solid rgba(0,0,0,0.08);
gap:10px;
}

.message-input input{
flex:1;
padding:12px 14px;
border-radius:12px;
border:none;
font-size:.9rem;
outline:none;
}

.message-input button{
background:#0f4d4f;
color:white;
border:none;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
font-weight:500;
transition:.15s;
}

.message-input button:hover{
opacity:.9;
}

/* Mobile */

@media(max-width:900px){

.messages-container{
grid-template-columns:1fr;
height:auto;
}

.sidebar{
height:200px;
}

}

</style>
</head>

<body>

<main class="page">

<header class="topbar">
<a href="/dashboard" class="logo">MedBridge</a>
<a href="/logout" class="logout">Log out</a>
</header>

<div class="messages-container">

<!-- Sidebar -->

<div class="sidebar">

<h3>Messages</h3>
<div id="conversationList"></div>

</div>

<!-- Chat Window -->

<div class="chat-window">

<div class="chat-header" id="chatHeader"></div>
<div class="messages"></div>

<div class="message-input">
<input type="text" placeholder="Type a message...">
<button>Send</button>
</div>

</div>

</div>

</main>
<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const input = document.querySelector(".message-input input");
const button = document.querySelector(".message-input button");
const messages = document.querySelector(".messages");
const conversationList = document.getElementById("conversationList");
const chatHeader = document.getElementById("chatHeader");

const DUMMY_THREAD = [
  { text: "Welcome to MedBridge messages.", senderRole: "system" },
  { text: "Real chat appears once both sides have accounts and send messages.", senderRole: "system" }
];

let currentUser = null;
let activeConversation = null;
let conversations = [];

button.onclick = sendMessage;
input.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    sendMessage();
  }
});

function sendMessage(){
  if(!currentUser || !activeConversation || activeConversation.isDummy) return;
  const text = input.value.trim();
  if(!text) return;

  const message = {
    recipient: activeConversation.id,
    text: text
  };

  socket.emit("chat message", message);
  input.value="";
}

socket.on("chat message", function(msg){
  if(!currentUser || !activeConversation || !msg) return;
  const isCurrentThread =
    (msg.sender === currentUser.id && msg.recipient === activeConversation.id) ||
    (msg.sender === activeConversation.id && msg.recipient === currentUser.id);

  if(!isCurrentThread) return;
  renderMessage(msg.text, msg.sender !== currentUser.id);
  updateConversationPreview(activeConversation.id, msg.text);
});

function renderMessage(text, isReceived){
  const div = document.createElement("div");
  div.classList.add("message", isReceived ? "received" : "sent");
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function renderThreadEntries(entries){
  messages.innerHTML = "";
  entries.forEach((entry) => {
    const received = entry.sender_id !== currentUser.id;
    renderMessage(entry.content || entry.text, received);
  });
}

function updateConversationPreview(conversationId, text){
  const conversation = conversations.find((item) => item.id === conversationId);
  if(!conversation) return;
  conversation.last_message = text;
  const preview = document.querySelector(`.conversation[data-id="${conversationId}"] .conversation-preview`);
  if(preview){
    preview.textContent = text;
  }
}

async function setActiveConversation(index){
  activeConversation = conversations[index];

  Array.from(conversationList.querySelectorAll(".conversation")).forEach((item, itemIndex) => {
    item.classList.toggle("active", itemIndex === index);
  });

  chatHeader.textContent = `${activeConversation.name} \u2014 ${activeConversation.roleLabel}`;

  if(activeConversation.isDummy){
    renderThreadEntries(DUMMY_THREAD);
    input.disabled = true;
    button.disabled = true;
    input.placeholder = "Create a real doctor/patient account to start messaging.";
    return;
  }

  input.disabled = false;
  button.disabled = false;
  input.placeholder = "Type a message...";

  try{
    const response = await fetch(`/api/messages/thread/${activeConversation.id}`);
    if(!response.ok){
      throw new Error("Failed to load thread");
    }
    const data = await response.json();
    renderThreadEntries(data.messages || []);
  } catch (err){
    console.error(err);
    renderThreadEntries([{ text: "Could not load this conversation." }]);
  }
}

function renderConversations(list){
  conversationList.innerHTML = "";

  list.forEach((conversation, index) => {
    const card = document.createElement("div");
    card.className = "conversation";
    if(conversation.id){
      card.dataset.id = conversation.id;
    }
    const previewText = conversation.last_message || conversation.preview || "No messages yet.";
    card.innerHTML = `
      <div class="conversation-name">${conversation.name}</div>
      <div class="conversation-preview">${previewText}</div>
    `;

    card.addEventListener("click", () => {
      setActiveConversation(index);
    });

    conversationList.appendChild(card);
  });

  if(list.length > 0){
    setActiveConversation(0);
  } else {
    chatHeader.textContent = "No conversations available";
    messages.innerHTML = "";
    input.disabled = true;
    button.disabled = true;
  }
}

async function initMessaging(){
  try{
    const response = await fetch("/api/me");
    if(!response.ok){
      throw new Error("Failed to fetch user");
    }

    const data = await response.json();
    currentUser = data.user;

    const convoResponse = await fetch("/api/messages/conversations");
    if(!convoResponse.ok){
      throw new Error("Failed to fetch conversations");
    }
    const convoData = await convoResponse.json();

    conversations = (convoData.conversations || []).map((item) => ({
      id: item.id,
      name: `${item.first_name} ${item.last_name}`,
      roleLabel: item.role === "doctor" ? "Doctor" : "Client",
      last_message: item.last_message
    }));

    if(conversations.length === 0){
      conversations = [
        {
          id: null,
          name: currentUser.role === "doctor" ? "Demo Client" : "Demo Doctor",
          roleLabel: currentUser.role === "doctor" ? "Client" : "Doctor",
          preview: "No matching accounts yet.",
          isDummy: true
        }
      ];
    }

    renderConversations(conversations);
  } catch (err){
    console.error(err);
    currentUser = { id: 1, role: "doctor" };
    conversations = [
      { id: null, name: "Demo Client", roleLabel: "Client", preview: "Offline mode", isDummy: true }
    ];
    renderConversations(conversations);
  }
}

initMessaging();
</script>
</body>
</html>
