<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedBridge Messages</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#ebe6e6;
color:#111;
min-height:100vh;
}

.page{
max-width:1300px;
margin:0 auto;
padding:28px 32px 48px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:36px;
}

.logo{
font-family:'Cormorant Garamond',serif;
font-size:3.4rem;
color:#0f4d4f;
text-decoration:none;
}

.logout{
text-decoration:none;
color:#555;
font-weight:500;
}

.messages-container{
display:grid;
grid-template-columns:320px 1fr;
gap:28px;
height:70vh;
}

/* Sidebar */

.sidebar{
background:#dfd8d8;
border-radius:22px;
padding:18px;
overflow-y:auto;
}

.sidebar h3{
margin-bottom:18px;
font-weight:600;
}

.conversation{
padding:14px;
border-radius:14px;
margin-bottom:10px;
cursor:pointer;
transition:.15s;
}

.conversation:hover{
background:#ece7e7;
}

.conversation.active{
background:#ffffff;
}

.conversation-name{
font-weight:600;
font-size:.95rem;
}

.conversation-preview{
font-size:.8rem;
color:#666;
margin-top:3px;
}

/* Chat Window */

.chat-window{
background:#dfd8d8;
border-radius:22px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.chat-header{
padding:18px 22px;
border-bottom:1px solid rgba(0,0,0,0.08);
font-weight:600;
}

.messages{
flex:1;
padding:24px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:14px;
}

.message{
max-width:60%;
padding:12px 16px;
border-radius:16px;
font-size:.9rem;
line-height:1.4;
}

.received{
background:#ffffff;
align-self:flex-start;
}

.sent{
background:#0f4d4f;
color:white;
align-self:flex-end;
}

/* Input */

.message-input{
display:flex;
padding:18px;
border-top:1px solid rgba(0,0,0,0.08);
gap:10px;
}

.message-input input{
flex:1;
padding:12px 14px;
border-radius:12px;
border:none;
font-size:.9rem;
outline:none;
}

.message-input button{
background:#0f4d4f;
color:white;
border:none;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
font-weight:500;
transition:.15s;
}

.message-input button:hover{
opacity:.9;
}

/* Mobile */

@media(max-width:900px){

.messages-container{
grid-template-columns:1fr;
height:auto;
}

.sidebar{
height:200px;
}

}

</style>
</head>

<body>

<main class="page">

<header class="topbar">
<a href="/dashboard" class="logo">MedBridge</a>
<a href="/logout" class="logout">Log out</a>
</header>

<div class="messages-container">

<!-- Sidebar -->

<div class="sidebar">

<h3>Messages</h3>
<div id="conversationList"></div>

</div>

<!-- Chat Window -->

<div class="chat-window">

<div class="chat-header" id="chatHeader"></div>
<div class="messages"></div>

<div class="message-input">
<input type="text" placeholder="Type a message...">
<button>Send</button>
</div>

</div>

</div>

</main>
<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const input = document.querySelector(".message-input input");
const button = document.querySelector(".message-input button");
const messages = document.querySelector(".messages");
const conversationList = document.getElementById("conversationList");
const chatHeader = document.getElementById("chatHeader");

const DOCTOR_CONVERSATIONS = [
  {
    name: "Mia Johnson",
    roleLabel: "Client",
    preview: "Can we review my blood pressure plan?",
    thread: [
      { text: "Hi Dr. Patel, I reviewed the referral options.", received: true },
      { text: "Can you send one to a clinic close to Denver?", received: true },
      { text: "Yes, I can send that now and follow up today.", received: false },
      { text: "Thank you, that works for me.", received: true }
    ]
  },
  {
    name: "Noah Patel",
    roleLabel: "Client",
    preview: "I uploaded my glucose log.",
    thread: [
      { text: "I uploaded my glucose log to the portal.", received: true },
      { text: "Perfect, I will review it before our follow-up.", received: false }
    ]
  },
  {
    name: "Elena Ruiz",
    roleLabel: "Client",
    preview: "My follow-up pain is improving.",
    thread: [
      { text: "My follow-up pain is improving this week.", received: true },
      { text: "Good progress. Keep the same care plan for now.", received: false }
    ]
  }
];

const PATIENT_CONVERSATIONS = [
  {
    name: "Dr. Aisha Khan",
    roleLabel: "Doctor",
    preview: "Your referral request was approved.",
    thread: [
      { text: "Your referral request was approved.", received: true },
      { text: "Great, when should I call the specialist office?", received: false },
      { text: "You can call this afternoon. I added details to your chart.", received: true }
    ]
  },
  {
    name: "Dr. Marcus Lee",
    roleLabel: "Doctor",
    preview: "Please continue your current meds.",
    thread: [
      { text: "Please continue your current meds until Friday.", received: true },
      { text: "Got it, I will keep the same schedule.", received: false }
    ]
  },
  {
    name: "Dr. Priya Nair",
    roleLabel: "Doctor",
    preview: "Let me know if symptoms increase.",
    thread: [
      { text: "Let me know if symptoms increase before your visit.", received: true },
      { text: "Will do, thank you for checking in.", received: false }
    ]
  }
];

let currentUser = null;
let activeConversation = null;

button.onclick = sendMessage;
input.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    sendMessage();
  }
});

function sendMessage(){

  const text = input.value.trim();
  if(!text) return;

  renderMessage(text, false);

  const senderId = currentUser?.id || 1;
  const recipientId = activeConversation?.recipientId || 2;
  const message = {
    sender: senderId,
    recipient: recipientId,
    text: text
  };

  socket.emit("chat message", message);

  input.value="";
}

socket.on("chat message", function(msg){
  if(!currentUser) return;
  if(msg.sender === currentUser.id) return;
  renderMessage(msg.text, true);
});

function renderMessage(text, isReceived){
  const div = document.createElement("div");
  div.classList.add("message", isReceived ? "received" : "sent");
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function renderThread(conversation){
  messages.innerHTML = "";
  chatHeader.textContent = `${conversation.name} \u2014 ${conversation.roleLabel}`;

  conversation.thread.forEach((entry) => {
    renderMessage(entry.text, entry.received);
  });
}

function setActiveConversation(index, list){
  activeConversation = list[index];

  Array.from(conversationList.querySelectorAll(".conversation")).forEach((item, itemIndex) => {
    item.classList.toggle("active", itemIndex === index);
  });

  renderThread(activeConversation);
}

function renderConversations(list){
  conversationList.innerHTML = "";

  list.forEach((conversation, index) => {
    const card = document.createElement("div");
    card.className = "conversation";
    card.innerHTML = `
      <div class="conversation-name">${conversation.name}</div>
      <div class="conversation-preview">${conversation.preview}</div>
    `;

    card.addEventListener("click", () => {
      setActiveConversation(index, list);
    });

    conversationList.appendChild(card);
  });

  setActiveConversation(0, list);
}

async function initMessaging(){
  try{
    const response = await fetch("/api/me");
    if(!response.ok){
      throw new Error("Failed to fetch user");
    }

    const data = await response.json();
    currentUser = data.user;

    const list = currentUser.role === "doctor" ? DOCTOR_CONVERSATIONS : PATIENT_CONVERSATIONS;
    renderConversations(list);
  } catch (err){
    console.error(err);
    currentUser = { id: 1, role: "doctor" };
    renderConversations(DOCTOR_CONVERSATIONS);
  }
}

initMessaging();
</script>
</body>
</html>
